apiVersion: apps/v1
kind: Deployment
metadata:
  name: worldtime
  labels:
    app: worldtime
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worldtime
  template:
    metadata:
      labels:
        app: worldtime
    spec:
      containers:
      - name: worldtime
        image: worldtime:latest
        imagePullPolicy: IfNotPresent
        args: ["--server"]
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: "200m"
            memory: "128Mi"
          requests:
            cpu: "50m"
            memory: "64Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: worldtime
  labels:
    app: worldtime
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
  selector:
    app: worldtime
