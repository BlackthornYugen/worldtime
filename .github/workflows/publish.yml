name: Build and Publish to GHCR

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        id: prep
        run: |
          echo "image=ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]' >> "$GITHUB_OUTPUT"

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          provenance: false # Disable build provenance metadata to avoid containerd multi-platform errors
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.prep.outputs.image }}:latest
            ${{ steps.prep.outputs.image }}:${{ github.sha }}

      - name: Deploy to Kubernetes
        if: ${{ secrets.KUBECONFIG != '' }}
        env:
          KUBECONFIG_SECRET: ${{ secrets.KUBECONFIG }}
        run: |
          echo "${KUBECONFIG_SECRET}" > kubeconfig.yaml
          export KUBECONFIG=kubeconfig.yaml
          
          helm upgrade --install worldtime ./chart \
            --namespace github \
            --set image.tag=${{ github.sha }} \
            --set image.repository=${{ steps.prep.outputs.image }}

