name: Build and Publish to GHCR

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      KUBECONFIG_SECRET: ${{ secrets.KUBECONFIG }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        id: prep
        run: |
          echo "image=ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]' >> "$GITHUB_OUTPUT"

      - name: Compute version
        id: version
        run: |
          echo "version=$(git describe --tags --always --dirty)" >> "$GITHUB_OUTPUT"

      - name: Build and Push Docker image (Main branch)
        if: github.ref_type == 'branch'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          provenance: false # Disable build provenance metadata to avoid containerd multi-platform errors
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            REPO_URL=${{ github.server_url }}/${{ github.repository }}
          tags: |
            ${{ steps.prep.outputs.image }}:dev
            ${{ steps.prep.outputs.image }}:${{ github.sha }}
            ${{ steps.prep.outputs.image }}:${{ github.sha }}-${{ github.ref_name }}

      - name: Tag existing image (Tags)
        if: github.ref_type == 'tag'
        run: |
          IMAGE_SHA="${{ steps.prep.outputs.image }}:${{ github.sha }}"
          echo "Waiting for $IMAGE_SHA to be available..."
          for i in {1..30}; do
            if docker buildx imagetools inspect $IMAGE_SHA > /dev/null 2>&1; then
              echo "Image found!"
              break
            fi
            echo "Waiting 10 seconds..."
            sleep 10
          done
          
          # This will fail if the image still isn't available after 5 minutes, which is intended.
          docker buildx imagetools create \
            $IMAGE_SHA \
            -t ${{ steps.prep.outputs.image }}:${{ github.sha }}-${{ github.ref_name }} \
            -t ${{ steps.prep.outputs.image }}:${{ github.ref_name }} \
            -t ${{ steps.prep.outputs.image }}:latest

      - name: Deploy to Kubernetes
        if: ${{ env.KUBECONFIG_SECRET != '' }}
        run: |
          echo "${KUBECONFIG_SECRET}" > kubeconfig.yaml
          export KUBECONFIG=kubeconfig.yaml
          
          RELEASE_NAME="worldtime"
          if [[ "${{ github.ref }}" == refs/heads/main ]]; then
            RELEASE_NAME="worldtime-main"
          fi
          
          echo "Deploying release: $RELEASE_NAME to namespace github"
          
          helm upgrade --install ${RELEASE_NAME} ./chart \
            --namespace github \
            --set image.tag=${{ github.sha }}-${{ github.ref_name }} \
            --set image.repository=${{ steps.prep.outputs.image }}

